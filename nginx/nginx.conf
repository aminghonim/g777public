events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Shared WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Internal Docker DNS resolver (Required for variable-based proxy_pass)
    # Using the Docker internal DNS server
    resolver 127.0.0.11 valid=30s;

    server {
        listen 80;
        server_name localhost;

        # --- Global Proxy Defaults ---
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # --- API and Backend (WebSocket + SSE ready) ---
        location / {
            # Use Variables to force runtime DNS resolution and prevent Nginx crash if host is down
            set $backend_upstream g777_backend:8000;
            proxy_pass http://$backend_upstream;

            # WebSocket handshake passthrough
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # SSE: disable buffering so events stream in real-time
            proxy_buffering off;
            proxy_cache off;

            # Long-lived connection timeouts (5 min)
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # --- Baileys Bridge (WebSocket critical) ---
        location /bridge/ {
            # Use Variables to force runtime DNS resolution
            set $bridge_upstream baileys_bridge:3000;
            proxy_pass http://$bridge_upstream/;

            # WebSocket handshake passthrough
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Long-lived connection for Baileys socket (1 hour)
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # --- Evolution API (Optional) ---
        location /evolution/ {
            set $evolution_upstream evolution_api:8080;
            proxy_pass http://$evolution_upstream/;
        }

        # --- Health checks ---
        location /health {
            set $health_upstream g777_backend:8000;
            proxy_pass http://$health_upstream/health;
        }
    }
}
