# =============================================================================
# G777 SAAF Platform - Production Docker Compose
# Services: backend (FastAPI + Chrome), evolution (WhatsApp API), n8n (Automation)
# Network: All services communicate via internal DNS names (NOT localhost)
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Service 0: PostgreSQL Database (Local)
  # - High-performance local PostgreSQL for development and production
  # - Persistent data storage with automatic backups
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: g777_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: g777_crm
      POSTGRES_USER: g777_admin
      POSTGRES_PASSWORD: G777SecureDB2026
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - g777_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U g777_admin -d g777_crm"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Service 1: G777 FastAPI Backend
  # - Builds from local Dockerfile (includes Chrome layer)
  # - Connects to evolution and n8n via internal service names
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: g777_backend
    restart: unless-stopped
    env_file:
      # WHY: .env.docker is the committed template (contains CHANGE_ME placeholders).
      # .env.docker.local is the real file with production secrets (gitignored).
      - .env.docker.local
    environment:
      # Override localhost URLs to use internal Docker service names
      EVOLUTION_PUBLIC_URL: http://evolution:8080
      BAILEYS_API_URL: http://evolution:8080
      N8N_WEBHOOK_URL: http://g777_n8n:5678
      SENTRY_DSN: ""
      # Chrome flags required for headless operation inside containers
      CHROME_FLAGS: "--no-sandbox --disable-dev-shm-usage --disable-gpu"
      # Standardize port to 8081 for both host and container
      PORT: 8081
    ports:
      - "8081:8081"
    volumes:
      # Persistent browser session (QR scan stays alive across restarts)
      - chrome_profile:/app/chrome_profile
      # WhatsApp auth session files
      - auth_info:/app/auth_info
      # Scraped data output directory
      - app_data:/app/data
      # Handshake session token sharing (CRITICAL for fixing 401 error)
      - ./.antigravity:/app/.antigravity
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8081", "--log-level", "warning"]
    depends_on:
      postgres:
        condition: service_healthy
      evolution:
        condition: service_healthy
      n8n:
        condition: service_started
    networks:
      - g777_network
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---------------------------------------------------------------------------
  # Service 2: Evolution API (WhatsApp Bridge)
  # - Official image: atendai/evolution-api:latest
  # - Handles all WhatsApp instance management and messaging
  # - Backend communicates with it via http://evolution:8080
  # ---------------------------------------------------------------------------
  evolution:
    image: evoapicloud/evolution-api:v1.8.2
    container_name: g777_evolution
    restart: unless-stopped
    environment:
      # Server identity
      SERVER_TYPE: http
      SERVER_PORT: 8080
      # Security: API Key for authenticating backend requests
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
      # Webhook configuration: Evolution notifies backend on incoming messages.
      # WHY: /webhook/whatsapp is the actual M7-secured route (HMAC-SHA256 verified).
      # Confirmed in backend/webhook_handler.py line 347. Two aliases exist:
      #   Primary:  /webhook/whatsapp
      #   Alias:    /api/webhook/evolution
      WEBHOOK_GLOBAL_URL: http://backend:8000/webhook/whatsapp
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "false"
      # Session storage: persist QR and connection state to volume
      DATABASE_ENABLED: "false"
      STORE_MESSAGES: "true"
      STORE_MESSAGE_UP: "true"
      STORE_CONTACTS: "true"
      STORE_CHATS: "true"
      # Performance tuning
      DEL_INSTANCE_ON_CLOSE: "false"
    ports:
      - "8080:8080"
    volumes:
      # All WhatsApp session data persists here (never lose QR scan)
      - evolution_data:/evolution/instances
    networks:
      - g777_network
    healthcheck:
      # تم التبديل لـ wget المدعوم في كل حاويات Alpine لمنع الـ Deadlock
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Service 3: n8n (Workflow Automation)
  # - Official image: docker.n8n.io/n8n/n8n:latest
  # - Connects to backend via http://backend:8000 for webhook triggers
  # - UI accessible at http://localhost:5678
  # ---------------------------------------------------------------------------
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: g777_n8n
    restart: unless-stopped
    environment:
      # Encryption key for stored credentials (must be stable across restarts)
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      # Webhook base URL: used when n8n generates webhook endpoints
      WEBHOOK_URL: http://n8n:5678
      # Disable telemetry in production
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      # Timezone for workflow scheduling
      GENERIC_TIMEZONE: Africa/Cairo
      TZ: Africa/Cairo
    ports:
      - "5678:5678"
    volumes:
      # Persist all workflows, credentials, and execution history
      - n8n_data:/home/node/.n8n
    networks:
      - g777_network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

# =============================================================================
# Named Volumes (data persists across container restarts and rebuilds)
# =============================================================================
volumes:
  chrome_profile:
    name: g777_chrome_profile
  auth_info:
    name: g777_auth_info
  app_data:
    name: g777_app_data
  evolution_data:
    name: g777_evolution_data
  n8n_data:
    name: g777_n8n_data
  postgres_data:
    name: g777_postgres_data

# =============================================================================
# Internal Network (services discover each other by container name)
# =============================================================================
networks:
  g777_network:
    name: g777_network
    driver: bridge
