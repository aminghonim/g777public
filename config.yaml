# 🛡️ Antigravity G777 - Configuration System
# Strict Mandate: No hardcoded parameters in implementation files.

system:
  app_name: "Antigravity G777"
  version: "2.2.0"
  environment: "production"

evolution_api:
  url: "http://localhost:3000"
  api_key: ""  # Loaded from EVOLUTION_API_KEY in .env - DO NOT hardcode here
  instance_name: "G777"
  baileys_api_url: "http://localhost:3000"

network:
  default_port: 8080

delays:
  # Random delay between messages during campaigns
  campaign:
    min: 5
    max: 15
  # Delay between extraction steps (Maps, Social)
  scraping:
    min: 2
    max: 5

working_hours:
  # 24h format (9 AM to 10 PM)
  start: 9
  end: 22

security:
  # Toggle for Strictly Enforced Authentication
  auth_required: true
  # Allow "Direct Access" mode via a Guest Link/Button
  allow_guest_access: true
  guest_username: "guest_admin"
  guest_instance_name: "G777_Guest"
  guest_email: "guest@localhost"
  # Max retry attempts for API calls
  max_retries: 3
  # Ban protection: Max messages per hour
  max_msg_per_hour: 200

features:
  google_maps:
    max_results_default: 50
    api_key: "" # Optional: If using official API
  whatsapp_warmer:
    messages_per_day: 50
    inter_message_delay_range: [60, 300]

updates:
  check_url: "https://api.g777.com/v1/updates/check"
  download_base_url: "https://storage.g777.com/binaries/"
  channel: "stable"
  enable_auto_check: true
  bootstrapper_path: "scripts/updater_bootstrapper.py"

scraper_settings:
  engine: "scrapling"
  headless: true
  stealth_mode: true
  adaptive: true
  timeout: 45
  max_concurrency: 5
  
  # Selectors - Zero Hardcoding Compliance
  selectors:
    whatsapp:
      dialog_selector: "div[role='dialog']"
      member_list_selector: "div[role='listitem']"
      group_name_selector: "div[id='pane-side'] div[aria-selected='true'] span[title], #main header span[title]"
      scroll_container: "div[role='dialog'] div[style*='overflow-y']"
      member_item: "div[role='listitem'], div[data-testid*='cell'], div[class*='x1n2onr6']"
      
  # JavaScript Templates - Config-Driven
  js_templates:
    member_extraction: |
      var dialog = document.querySelector('{{dialog_selector}}');
      if (!dialog) return [];
      var members = [];
      var items = dialog.querySelectorAll('{{member_item_selector}}');
      
      items.forEach(function(item, index) {
          try {
              var fullText = item.innerText || item.textContent || '';
              var phoneRegex = /\+\d[\d\s\-\(\)]{8,}/g;
              var phoneMatches = fullText.match(phoneRegex);
              if (phoneMatches) {
                  phoneMatches.forEach(function(rawPhone) {
                      var cleanPhone = rawPhone.replace(/\D/g, '');
                      if (cleanPhone.length >= 10) {
                          var nameText = fullText.replace(rawPhone, '').split('\n')[0].trim();
                          members.push({
                              name: nameText || 'Unknown',
                              phone: cleanPhone,
                              index: index
                          });
                      }
                  });
              }
          } catch(e) {}
      });
      return members;
      
    smart_scroll: |
      var container = document.querySelector('{{scroll_container}}');
      if (!container) return false;
      container.scrollTop = container.scrollHeight;
      return true;
  
  identity:
    session_vault: "local"
    session_path: ".antigravity/sessions/"
    auto_inject: true
  
  telemetry:
    enabled: true
    failure_threshold: 3
    track_latency: true
    
  validation:
    strict_schema: true
    pii_encryption: true
    
  proxy:
    enabled: false
    rotation: "cyclic"
    list: []
  
  targets:
    whatsapp_groups:
      base_url: "https://web.whatsapp.com"
      member_list_selector: 'div[role="listitem"]'
      group_name_selector: "div[id='pane-side'] div[aria-selected='true'] span[title], #main header span[title]"
    facebook_search:
      search_url: "https://www.google.com"
      search_query_template: "site:facebook.com \"chat.whatsapp.com\" {keyword} {country}"
      result_selector: "div[id='search']"
      facebook_link_selector: "//a[contains(@href, 'facebook.com') and not(contains(@href, 'google'))]"
    google_maps:
      search_url: "https://www.google.com/maps"
      result_selector: "div[data-result-index]"
      business_name_selector: "h3, div[class*='headline']"
      phone_selector: "[data-item-id*='phone'], [href*='tel']"
      address_selector: "[data-item-id*='address']"

# ============================================
# G777 AI Instructions - System Prompts
# ============================================
ai_instructions:
  # Intent Classification System
  intent_classifier:
    role: "G777 Intent Classification Engine"
    task: "Analyze user messages to determine if they are business-related and extract the intent."
    rules:
      - "Return ONLY valid JSON, no markdown, no explanations"
      - "Business intents: booking, price_inquiry, complaint, support, feedback"
      - "Personal intents: greeting, personal_chat, spam"
    output_schema:
      is_business: "boolean (true if business-related)"
      intent: "string (the detected intent)"
      confidence: "float (0.0 to 1.0)"
    example: |
      User: "I want to book a flight to Paris tomorrow"
      Response: {"is_business": true, "intent": "booking", "confidence": 0.95}

  # Data Extraction System
  data_extractor:
    role: "G777 Data Extraction Engine"
    task: "Extract specific information from user messages based on required fields."
    rules:
      - "Return ONLY valid JSON"
      - "Only include fields that are clearly present in the message"
      - "Do not infer or guess missing information"
    output_schema:
      name: "string (customer name if mentioned)"
      location: "string (city/country if mentioned)"
      destination: "string (travel destination if mentioned)"
      date: "string (date in YYYY-MM-DD if mentioned)"
    example: |
      Required: ["name", "destination"]
      User: "My name is Ahmed and I want to go to Dubai"
      Response: {"name": "Ahmed", "destination": "Dubai"}

  # Main Assistant (Customer-facing)
  main_assistant:
    role: "G777 Smart Sales Agent (Yasmine)"
    task: "SELL TRIPS IMMEDIATELY. Your ONLY goal is to show the price and close the deal."
    personality:
      - "Direct and to the point"
      - "Confident Salesperson"
      - "Never answers a question with a question"
    rules:
      - "CRITICAL: If the user asks about price, cost, or 'how much', you MUST output the FULL LIST of trips and prices from {offerings_list} immediately."
      - "NEVER ask 'which trip?' or 'what is your budget?'. JUST GIVE THE LIST."
      - "NEVER say 'prices vary'. Prices are fixed and listed in your context."
      - "Speak Egyptian Arabic (Friendly but Professional)."
      - "If asked about details (location, safety), answer briefly using the FAQ info."
    context_format: |
      You are Yasmine from {business_name}.
      
      [[ OFFICIAL PRICE LIST - DO NOT HALLUCINATE ]]
      {offerings_list}
      
      [[ CURRENT CUSTOMER ]]
      {customer_info}
      
      [[ INSTRUCTIONS ]]
      - If user asks for price -> Show the Price List above.
      - If user asks for details -> Explain based on the list.
      - Do NOT ask for more info. Assume the user wants to see everything.

# ============================================
# Sentinel Metrics & Governance Rules
# ============================================
sentinel:
  thresholds:
    latency_max_ms: 15000       # 15 seconds
    memory_limit_mb: 500        # 500 MB RAM limit warning
    token_usage_limit: 100000   # Daily token limit (example)
    error_burst_limit: 5        # Max consecutive errors before freeze

  actions:
    high_latency: "log_warning"
    high_memory: "trigger_gc"
    critical_error: "freeze_agent"

  logging:
    db_path: "data/sentinel_metrics.db"
    enabled: true
