# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "ar"
early_access: false

reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_placeholder: "@coderabbitai summary"
  auto_review:
    enabled: true
    ignore_title_keywords:
      - "WIP"
      - "Draft"
    drafts: false
  
  # 🎯 The Secret Weapon: Filtering out the "Noise"
  # This section ensures CodeRabbit ONLY looks at the core logic,
  # keeping the file count well below the 150-file limit.
  path_filters:
    # ❌ IGNORE: Tests & Mocks (Not critical for AI logic review)
    - "!tests/**"
    - "!test/**"
    - "!frontend_flutter/test/**"
    - "!frontend_flutter/integration_test/**"
    
    # ❌ IGNORE: Documentation, Rules & Agent Skills
    - "!docs/**"
    - "!skills/**"
    - "!rules/**"
    - "!**/*.md"
    - "!**/*.mdc"
    - "!**/*.mdx"
    
    # ❌ IGNORE: Infrastructure, Scripts & Build Configs
    - "!Dockerfile"
    - "!docker-compose*.yaml"
    - "!requirements.txt"
    - "!frontend_flutter/pubspec.lock"
    - "!scripts/**"
    - "!tools/**"
    - "!backops/**"
    - "!.agent/**"
    - "!.n8n/**"
    - "!factory/**"
    - "!ui_designs/**"
    - "!nginx/**"

    # ❌ IGNORE: Frontend Boilerplate & Native Platforms
    - "!frontend_flutter/android/**"
    - "!frontend_flutter/ios/**"
    - "!frontend_flutter/web/**"
    - "!frontend_flutter/macos/**"
    - "!frontend_flutter/windows/**"
    - "!frontend_flutter/linux/**"
    - "!frontend_flutter/assets/**"
    
    # ❌ IGNORE: Deleted/Obsolete Features (To reduce file count for review)
    - "!frontend_flutter/lib/features/maps_extractor/**"
    - "!frontend_flutter/lib/features/members_grabber/**"
    - "!frontend_flutter/lib/features/links_grabber/**"
    - "!frontend_flutter/lib/features/poll_sender/**"
    - "!frontend_flutter/lib/features/status_saver/**"
    - "!frontend_flutter/lib/l10n/**"
    - "!backend/market_intelligence/sources/maps_extractor.py"
    
    # ✅ FOCUS: Implicitly, everything else is included:
    # - backend/**/*.py
    # - frontend_flutter/lib/**/*.dart
    # - core/**/*.py

  tools:
    biome:
      enabled: false
    checkov:
      enabled: false
    golangci-lint:
      enabled: false
    languagetool:
      enabled: false
    markdownlint:
      enabled: false
    hadolint:
      enabled: false
    shellcheck:
      enabled: false
    ruff:
      enabled: true # Enable Ruff for Python
    eslint:
      enabled: false
    actionlint:
      enabled: false
      
  path_instructions:
    - path: "**/*.py"
      instructions: |
        انت الان "Sentinel" عضو في CNS Squad.
        - تاكد من عدم كسر الكود القديم (Zero-Regression).
        - امنع كتابة كلمات مرور او API Keys كقيمة ثابتة (Hardcoding).
        - تاكد من وجود Type Hinting في التوابع (Functions).
        - لا تستخدم `print` ابدا، استخدم `logging` فقط.
        - تاكد من وجود `tenacity` retry policy عند عمل اتصالات شبكية.
        - في نهاية كل مراجعة اكتب: "CNS Squad Python Audit Completed."

    - path: "frontend_flutter/lib/**/*.dart"
      instructions: |
        انت الان "Sentinel" عضو في CNS Squad.
        - تاكد من استخدام `flutter_secure_storage` لحفظ البيانات الحساسة بدلا من SharedPrefs.
        - لا تستخدم `print()` ولكن استبدلها بـ `debugPrint()`.
        - حافظ على هيكلة واجهات المستخدم واداء الـ 16ms للاطار الواحد.
        - في نهاية كل مراجعة اكتب: "CNS Squad Dart Audit Completed."

    - path: "**/*"
      instructions: |
        عليك التحدث بالعربية.
        لا تستخدم Emojis في ملفات الاكواد.
        حظر اي Filler Comments التي لا توضح السبب (Why).

chat:
  auto_reply: true
