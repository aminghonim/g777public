# Niche Configuration for Market Intelligence
# Used to filter trends relative to the business type

niche: "general"  # Initial default, can be: restaurant, real_estate, pharmacy, etc.
location: "Egypt" # Target country for trends

# Keywords to track (High Priority)
keywords:
  - "offers"
  - "discounts"
  - "new arrival"

# Competitors to monitor (for social listening)
competitors: []

# Enabled Data Sources
sources:
  google_trends: true
  tiktok: false  # Disabled by default until configured
  meta_ads: false # Disabled by default until configured
  google_maps: true

# Scoring Weights (0.0 to 1.0)
weights:
  frequency: 0.4
  growth: 0.3
  relevance: 0.3
