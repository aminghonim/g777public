
# ═══════════════════════════════════════════════════════════════════
# ANTIGRAVITY SUITE - Master Configuration
# Version: 3.1 (Universal Business Edition)
# ═══════════════════════════════════════════════════════════════════
# This configuration is GENERIC and can be customized from the UI
# for ANY business type: Travel, Clothing, Digital Products, Services, etc.

# ─────────────────────────────────────────────────────────────────
# 🚀 DEPLOYMENT SETTINGS
# ─────────────────────────────────────────────────────────────────
deployment:
  region: "North Europe"
  containers:
    evolution_api:
      cpu: 1
      memory_gb: 1
      port: 8080
    fastapi_webhook:
      cpu: 0.5
      memory_gb: 0.5
      port: 5000

# ─────────────────────────────────────────────────────────────────
# 📱 WHATSAPP INTEGRATION
# ─────────────────────────────────────────────────────────────────
whatsapp:
  provider: "evolution"  # Updated to Evolution
  
  baileys:
    service_url: "${BAILEYS_SERVICE_URL}"
    reconnect_interval: 30
    
  evolution:
    api_url: "${EVOLUTION_API_URL}"
    api_key: "${EVOLUTION_API_KEY}"
    instance_name: "G777"   # Updated Default

# ─────────────────────────────────────────────────────────────────
# 🗄️ DATABASE
# ─────────────────────────────────────────────────────────────────
database:
  provider: "supabase"  # Updated
  url: "${DATABASE_URL}"

# ─────────────────────────────────────────────────────────────────
# 🤖 BOT IDENTITY & PERSONALITY (Customizable from UI)
# ─────────────────────────────────────────────────────────────────
bot_identity:
  # These values are DEFAULTS - they get overridden by tenant_settings in DB
  name: "Smart Assistant"
  business_name: "My Business"
  business_type: "general"  # travel_agency, clothing_store, digital_products, services, etc.
  language: "Arabic"
  
  # Personality Modes based on time
  personality_modes:
    working_hours:
      start: "09:00"
      end: "22:00"
      style: "friendly_sales"
      response_delay_seconds: 2
      
    after_hours:
      style: "polite_defer"
      auto_message: |
        شكراً لتواصلك! 🌙
        نحن خارج أوقات العمل حالياً.
        سنرد عليك في أقرب وقت ممكن.

# ─────────────────────────────────────────────────────────────────
# 🧠 AI CONFIGURATION
# ─────────────────────────────────────────────────────────────────
ai:
  provider: "gemini"
  model: "gemini-2.0-flash"
  
  # System Prompt is loaded from database (tenant_settings.identity_prompt)
  # This allows customization without code changes
  
  parameters:
    temperature: 0.7
    max_tokens: 500
    
  safety_settings:
    block_personal: true
    personal_keywords:
      - "صديقي"
      - "حبيبي"
      - "أخي"
      - "ماما"
      - "بابا"

# ─────────────────────────────────────────────────────────────────
# 🔄 AUTOMATION PIPELINES
# ─────────────────────────────────────────────────────────────────
automations:
  # Welcome message for new leads
  welcome_new_leads:
    enabled: true
    delay_minutes: 5
    # Message is loaded from database (tenant_settings.greeting_message)
      
  # Follow-up for silent customers
  follow_up_silent:
    enabled: true
    after_hours: 24
    # Message is customizable from UI

# ─────────────────────────────────────────────────────────────────
# 📊 BUSINESS TYPES SUPPORTED
# ─────────────────────────────────────────────────────────────────
supported_business_types:
  - id: "travel_agency"
    name_ar: "وكالة سفر وسياحة"
    icon: "flight"
    sample_categories:
      - "رحلات داخلية"
      - "رحلات خارجية"
      - "حجز فنادق"
      
  - id: "clothing_store"
    name_ar: "متجر ملابس"
    icon: "checkroom"
    sample_categories:
      - "ملابس رجالي"
      - "ملابس حريمي"
      - "إكسسوارات"
      
  - id: "digital_products"
    name_ar: "منتجات رقمية"
    icon: "computer"
    sample_categories:
      - "برامج"
      - "تطبيقات"
      - "خدمات استضافة"
      
  - id: "restaurant"
    name_ar: "مطعم"
    icon: "restaurant"
    sample_categories:
      - "وجبات رئيسية"
      - "مشروبات"
      - "حلويات"
      
  - id: "general"
    name_ar: "نشاط عام"
    icon: "business"
    sample_categories:
      - "منتجات"
      - "خدمات"
