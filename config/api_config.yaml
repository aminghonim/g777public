apis:
  shortener:
    primary: "https://cleanuri.com/api/v1/shorten"
    fallback: "https://spoo.me/"
    timeout_seconds: 5
    max_retries: 2
  maps_nominatim:
    base_url: "https://nominatim.openstreetmap.org/search"
    rate_limit_ms: 1050 # 1.05 seconds to be safe
    user_agent: "G777_Project_DataTool/1.0 (contact@yourdomain.com)"
  search_grabber:
    # 🛑 CRITICAL (Zero-Regression & Config-First Rules):
    # NEVER hardcode API keys or Engine IDs in this YAML file.
    # All sensitive credentials MUST be loaded from the .env file.
    # E.g., Use os.getenv("SEARCH_ENGINE_ID") in your Python scripts.
    daily_quota_limit: 100
app_logic:
  spintax:
    batch_size: 20
    enforce_variables: ["{name}", "{company}"] # Regex will validate these exist in Gemini output

